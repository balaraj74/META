version: '3.9'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://triage:triage@db:5432/triage
      - REDIS_URL=redis://redis:6379
      - USE_REDIS=true
      - HF_TOKEN=${HF_TOKEN}
      - MOCK_LLM=${MOCK_LLM:-true}
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
    command: >
      uvicorn triage.api.main:app
      --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build: .
    command: >
      celery -A triage.worker worker
      --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://triage:triage@db:5432/triage
      - REDIS_URL=redis://redis:6379
      - USE_REDIS=true
      - HF_TOKEN=${HF_TOKEN}
      - MOCK_LLM=${MOCK_LLM:-true}
    depends_on:
      - redis
      - db

  triage-env-server:
    build: .
    command: uvicorn triage.api.env_server:app --host 0.0.0.0 --port 8001
    environment:
      - GRPO_TRAINING_MODE=true
    ports:
      - "8001:8001"
    volumes:
      - ./:/app

  triage-grpo-trainer:
    build: .
    command: python scripts/train_grpo.py
    environment:
      - GRPO_TRAINING_MODE=true
      - TRIAGE_ENV_SERVER_URL=http://triage-env-server:8001
      - HF_TOKEN=${HF_TOKEN}
      - WANDB_API_KEY=${WANDB_API_KEY}
    depends_on:
      - triage-env-server
    volumes:
      - ./:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: triage
      POSTGRES_USER: triage
      POSTGRES_PASSWORD: triage
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triage"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
